<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PanPanXia 盘盘侠 — 云盘资源搜索</title>

  <!-- Primary Meta -->
  <meta name="description" content="PanPanXia 盘盘侠是开源云盘资源搜索引擎，聚合 TG 频道与第三方网盘搜索插件，快速获取百度网盘、阿里云盘、夸克网盘等资源链接、提取码与资源信息。">
  <meta name="keywords" content="网盘搜索,云盘资源,百度网盘,阿里云盘,夸克网盘,网盘链接,资源搜索,提取码,PanPanXia,盘盘侠,网盘搜索引擎">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="format-detection" content="telephone=no">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="PanPanXia 盘盘侠 — 云盘资源搜索">
  <meta property="og:description" content="聚合 TG 频道与各大云盘，快速获取网盘链接、提取码与资源信息。开源、免费、高速。">
  <meta property="og:site_name" content="PanPanXia 盘盘侠">
  <meta property="og:locale" content="zh_CN">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="PanPanXia 盘盘侠 — 云盘资源搜索">
  <meta name="twitter:description" content="聚合 TG 频道与各大云盘，快速获取网盘链接、提取码与资源信息。开源、免费、高速。">

  <!-- Canonical -->
  <link rel="canonical" href="/">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "PanPanXia 盘盘侠",
    "alternateName": "盘盘侠",
    "description": "开源云盘资源搜索引擎，聚合 TG 频道与第三方网盘搜索插件，快速获取网盘资源链接与提取码。",
    "url": "/",
    "inLanguage": "zh-CN",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-brand-icon">盘</span>
        PanPanXia
      </a>
      <div class="nav-auth">
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="section-light">
    <div class="hero">
      <h1 class="hero-heading">找到你想要的资源</h1>
      <p class="hero-subtitle">搜索 TG 频道和各大云盘，快速获取网盘链接、提取码与资源信息</p>

      <!-- Search Bar -->
      <div class="hero-search">
        <div class="search-bar">
          <input
            type="text"
            id="search-input"
            class="search-bar-input"
            placeholder="输入关键词搜索资源..."
            autocomplete="off"
            autofocus
          >
          <button class="search-bar-btn" id="search-btn">
            <span class="btn-text">搜索</span>
            <span class="btn-spinner"><span class="btn-spinner-icon"></span></span>
          </button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" id="filter-bar">
          <div class="filter-group">
            <button class="filter-chip active" data-filter-group="sourceType" data-filter-value="all">全部（默认）</button>
            <button class="filter-chip" data-filter-group="sourceType" data-filter-value="tg">TG频道</button>
            <button class="filter-chip" data-filter-group="sourceType" data-filter-value="plugin">网盘</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Results Section -->
  <section class="section-ivory section-sm">
    <div class="container">
      <!-- <div class="results-header">
      </div> -->

      <div id="results-container">
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <h3>输入关键词开始搜索</h3>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand-col">
          <a href="/" class="footer-brand">
            <span class="nav-brand-icon">盘</span>
            PanPanXia
          </a>
          <p class="footer-desc">开源云盘资源搜索引擎<br>聚合 TG 频道与第三方插件，快速发现网盘资源。</p>
        </div>

        <div class="footer-links-col">
          <div class="footer-link-group">
            <h4 class="footer-heading">项目</h4>
            <a href="https://github.com/NDFour/pansou-rust" target="_blank" rel="noopener noreferrer" class="footer-link">GitHub</a>
          </div>
          <div class="footer-link-group">
            <h4 class="footer-heading">联系我们</h4>
            <a href="mailto:ndfour@foxmail.com" class="footer-link">ndfour@foxmail.com</a>
          </div>
        </div>

        <div class="footer-links-col">
          <div class="footer-link-group">
            <h4 class="footer-heading">友情链接</h4>
            <a href="https://www.chenjin5.com" target="_blank" rel="noopener noreferrer" class="footer-link">沉金书屋</a>
            <a href="https://www.panshushu.com" target="_blank" rel="noopener noreferrer" class="footer-link">盘叔叔</a>
            <a href="https://www.codelicence.cn" target="_blank" rel="noopener noreferrer" class="footer-link">云盘4K</a>
          </div>
        </div>
      </div>

      <div class="footer-bottom">
        <p>&copy; 2026 PanPanXia &nbsp;&middot;&nbsp; Open source under MIT License</p>
      </div>
    </div>
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
