<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PanSou 盘搜 — 云盘资源搜索</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-brand-icon">盘</span>
        PanSou
      </a>
      <div class="nav-auth">
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="section-light">
    <div class="hero">
      <h1 class="hero-heading">找到你想要的资源</h1>
      <p class="hero-subtitle">搜索 TG 频道和各大云盘，快速获取网盘链接、提取码与资源信息</p>

      <!-- Search Bar -->
      <div class="hero-search">
        <div class="search-bar">
          <input
            type="text"
            id="search-input"
            class="search-bar-input"
            placeholder="输入关键词搜索资源..."
            autocomplete="off"
            autofocus
          >
          <button class="search-bar-btn" id="search-btn">搜索</button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
          <div class="filter-group">
            <span class="filter-group-label">数据源</span>
            <button class="filter-chip active" data-filter-group="sourceType" data-filter-value="all">全部</button>
            <button class="filter-chip" data-filter-group="sourceType" data-filter-value="tg">TG频道</button>
            <button class="filter-chip" data-filter-group="sourceType" data-filter-value="plugin">插件</button>
          </div>

          <div class="filter-group">
            <span class="filter-group-label">频道</span>
            <button class="filter-chip active" data-filter-group="channel" data-filter-value="">全部</button>
            <button class="filter-chip" data-filter-group="channel" data-filter-value="tgsearchers6">TG搜索</button>
            <button class="filter-chip" data-filter-group="channel" data-filter-value="yunpanpan">云盘盘</button>
            <button class="filter-chip" data-filter-group="channel" data-filter-value="zhao_source">赵资源</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Results Section -->
  <section class="section-ivory section-sm">
    <div class="container">
      <div class="results-header">
        <span class="results-count" id="results-count"></span>
        <div class="results-view-tabs">
          <button class="view-tab active" data-view="list">列表视图</button>
          <button class="view-tab" data-view="merged">分类聚合</button>
        </div>
      </div>

      <div id="results-container">
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <h3>输入关键词开始搜索</h3>
        </div>
      </div>

    </div>
  </section>

  <script src="/static/js/app.js"></script>
</body>
</html>
