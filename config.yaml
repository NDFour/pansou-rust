host: 0.0.0.0
port: 8888
channels:
  - tgsearchers6
  - sou1xia
  - Aliyun_4K_Movies
  - quark_movies
  - shareAliyun

log_level: info
# 日志文件路径，留空则不生成文件
log_file: logs/app.log

# 查询 tg 时的并发数
concurrency: 6
# 搜索结果内存缓存最大数量
# 超过该数量后，会淘汰最旧的条目
max_cache_size: 1024
# 搜索结果缓存时间，单位：秒
# 超过该时间后，会淘汰该条目
cache_ttl: 300

# 后置插件：搜索完成后将结果推送到 Python 服务落库
# 留空则不启用
post_search_endpoint: ""

# 网站域名，用于生成 sitemap 和 canonical URL（必填）
domain: "https://panpanxia.com"
