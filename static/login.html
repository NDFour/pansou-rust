<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — PanSou 盘搜</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-card-header">
      <a href="/" style="display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px; text-decoration: none;">
        <span style="width:32px;height:32px;background:var(--color-brand);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--color-ivory);font-family:var(--font-serif);font-weight:500;font-size:1rem;">盘</span>
      </a>
      <h2>登录 PanSou</h2>
      <p>输入您的凭据以访问盘搜服务</p>
      <p class="body-small text-stone mt-sm">演示环境默认端口: 8888</p>
    </div>

    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-username">用户名</label>
        <input
          type="text"
          id="login-username"
          class="form-input w-full"
          placeholder="请输入用户名"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">密码</label>
        <input
          type="password"
          id="login-password"
          class="form-input w-full"
          placeholder="请输入密码"
          autocomplete="current-password"
          required
        >
      </div>

      <div id="login-error" class="form-error hidden"></div>

      <button type="submit" class="btn btn-primary btn-lg w-full">登录</button>
    </form>

    <div class="auth-footer">
      <a href="/">返回首页</a>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
