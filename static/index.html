<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>盘盘侠 — 云盘资源搜索</title>

  <!-- Primary Meta -->

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="盘盘侠 — 云盘资源搜索">
  <meta property="og:description" content="聚合 TG 频道与各大云盘，快速获取网盘链接、提取码与资源信息。开源、免费、高速。">

  <meta name="twitter:image" content="https://panpanxia.com/static/og-image.png">

  <!-- Canonical -->
  <link rel="canonical" href="https://panpanxia.com/">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "PanPanXia 盘盘侠",
    "alternateName": "盘盘侠",
    "description": "开源云盘资源搜索引擎，聚合 TG 频道与第三方网盘搜索插件，快速获取网盘资源链接与提取码。",
    "url": "https://panpanxia.com/",
    "inLanguage": "zh-CN",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://panpanxia.com/search?kw={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

  <link rel="preload" as="style" href="/static/css/style.css?v=20260513">

<body>

  <!-- Navigation -->
  <nav class="nav" aria-label="主导航">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-brand-icon">盘</span>
        盘盘侠
      </a>
      <div class="nav-auth">
      </div>
    </div>
  </nav>

  <main>
  <!-- Hero Section -->
  <section class="section-light">
    <div class="hero">
      <h1 class="hero-heading">找到你想要的资源</h1>
      <p class="hero-subtitle">搜索 TG 频道和各大云盘，快速获取网盘链接、提取码与资源信息</p>

      <!-- Search Bar -->
      <div class="hero-search">
        <form class="search-bar" role="search" onsubmit="return false">
          <label for="search-input" class="sr-only">搜索网盘资源</label>
          <input
            type="search"
            id="search-input"
            class="search-bar-input"
            placeholder="输入关键词搜索资源..."
            autocomplete="off"
            autofocus
          >
          <button class="search-bar-btn" id="search-btn">
            <span class="btn-text">搜索</span>
            <span class="btn-spinner"><span class="btn-spinner-icon"></span></span>
          </button>
        </form>

        <!-- Filter Bar -->
        <div class="filter-bar" id="filter-bar">
          <div class="filter-group">
            <button class="filter-chip active" data-filter-group="sourceType" data-filter-value="all">全部（默认）</button>
            <button class="filter-chip" data-filter-group="sourceType" data-filter-value="tg">TG频道</button>
            <button class="filter-chip" data-filter-group="sourceType" data-filter-value="plugin">网盘</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Results Section -->
  <section class="section-sm" style="padding-top:0">
    <div class="container">
      <!-- <div class="results-header">
      </div> -->

      <div id="results-container"></div>

      <div class="hot-searches" style="text-align:center;">
        <p style="color:var(--color-stone);font-size:0.85rem;margin-bottom:0.75rem;">大家都在搜</p>
        <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:0.5rem;">
          <a href="/流浪地球" style="color:var(--color-brand);text-decoration:none;font-size:0.85rem;padding:0.25rem 0.75rem;border:1px solid var(--color-border-warm);border-radius:var(--radius-sm);">流浪地球</a>
          <a href="/search?kw=庆余年" style="color:var(--color-brand);text-decoration:none;font-size:0.85rem;padding:0.25rem 0.75rem;border:1px solid var(--color-border-warm);border-radius:var(--radius-sm);">庆余年</a>
          <a href="/search?kw=凡人修仙传" style="color:var(--color-brand);text-decoration:none;font-size:0.85rem;padding:0.25rem 0.75rem;border:1px solid var(--color-border-warm);border-radius:var(--radius-sm);">凡人修仙传</a>
          <a href="/search?kw=从零开始的异世界生活" style="color:var(--color-brand);text-decoration:none;font-size:0.85rem;padding:0.25rem 0.75rem;border:1px solid var(--color-border-warm);border-radius:var(--radius-sm);">从零开始的异世界生活</a>
          <a href="/search?kw=哪吒" style="color:var(--color-brand);text-decoration:none;font-size:0.85rem;padding:0.25rem 0.75rem;border:1px solid var(--color-border-warm);border-radius:var(--radius-sm);">哪吒</a>
          <a href="/search?kw=三体" style="color:var(--color-brand);text-decoration:none;font-size:0.85rem;padding:0.25rem 0.75rem;border:1px solid var(--color-border-warm);border-radius:var(--radius-sm);">三体</a>
          <a href="/search?kw=鬼灭之刃" style="color:var(--color-brand);text-decoration:none;font-size:0.85rem;padding:0.25rem 0.75rem;border:1px solid var(--color-border-warm);border-radius:var(--radius-sm);">鬼灭之刃</a>
          <a href="/search?kw=周杰伦" style="color:var(--color-brand);text-decoration:none;font-size:0.85rem;padding:0.25rem 0.75rem;border:1px solid var(--color-border-warm);border-radius:var(--radius-sm);">周杰伦</a>
        </div>
      </div>

    </div>
  </section>
