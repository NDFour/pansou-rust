<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PanSou 盘搜 — 云盘资源搜索</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-brand-icon">盘</span>
        PanSou
      </a>
      <div class="nav-auth">
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="section-light">
    <div class="hero">
      <h1 class="hero-heading">找到你想要的资源</h1>
      <p class="hero-subtitle">搜索 TG 频道和各大云盘，快速获取网盘链接、提取码与资源信息</p>

      <!-- Search Bar -->
      <div class="hero-search">
        <div class="search-bar">
          <input
            type="text"
            id="search-input"
            class="search-bar-input"
            placeholder="输入关键词搜索资源..."
            autocomplete="off"
            autofocus
          >
          <button class="search-bar-btn" id="search-btn">
            <span class="btn-text">搜索</span>
            <span class="btn-spinner"><span class="btn-spinner-icon"></span></span>
          </button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" id="filter-bar">
          <div class="filter-group">
            <button class="filter-chip active" data-filter-group="sourceType" data-filter-value="all">全部（默认）</button>
            <button class="filter-chip" data-filter-group="sourceType" data-filter-value="tg">TG频道</button>
            <button class="filter-chip" data-filter-group="sourceType" data-filter-value="plugin">网盘</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Results Section -->
  <section class="section-ivory section-sm">
    <div class="container">
      <div class="results-header">
        <span class="results-count" id="results-count"></span>
        <div class="results-view-tabs">
          <button class="view-tab active" data-view="list">列表视图</button>
          <button class="view-tab" data-view="merged">分类聚合</button>
        </div>
      </div>

      <div id="results-container">
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <h3>输入关键词开始搜索</h3>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand-col">
          <a href="/" class="footer-brand">
            <span class="nav-brand-icon">盘</span>
            PanSou
          </a>
          <p class="footer-desc">开源云盘资源搜索引擎<br>聚合 TG 频道与第三方插件，快速发现网盘资源。</p>
        </div>

        <div class="footer-links-col">
          <div class="footer-link-group">
            <h4 class="footer-heading">项目</h4>
            <a href="https://github.com/techguide-yb/pansou-rust" target="_blank" rel="noopener noreferrer" class="footer-link">GitHub</a>
          </div>
          <div class="footer-link-group">
            <h4 class="footer-heading">联系我们</h4>
            <a href="mailto:admin@pansou.example.com" class="footer-link">admin@pansou.example.com</a>
          </div>
        </div>

        <div class="footer-links-col">
          <div class="footer-link-group">
            <h4 class="footer-heading">友情链接</h4>
            <a href="https://jikepan.xyz" target="_blank" rel="noopener noreferrer" class="footer-link">极客盘</a>
            <a href="https://www.panshushu.com" target="_blank" rel="noopener noreferrer" class="footer-link">盘搜搜</a>
            <a href="https://pan666.net" target="_blank" rel="noopener noreferrer" class="footer-link">Pan666</a>
          </div>
        </div>
      </div>

      <div class="footer-bottom">
        <p>&copy; 2026 PanSou &nbsp;&middot;&nbsp; Open source under MIT License</p>
      </div>
    </div>
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
